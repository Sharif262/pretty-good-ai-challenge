id: "08_interruption_edge_case"
name: "Mid-sentence interruption test"
persona:
  name: "Sarah Thompson"
  age: 31
  tone: "energetic, talks over the agent occasionally"
  speaking_style: "starts speaking before the agent finishes, then apologizes"
goal: |
  Schedule a sick visit for tomorrow. Interrupt once mid-sentence when the agent is listing times,
  then say sorry and ask them to repeat the options.
constraints:
  - "Interrupt exactly once, early in the call"
  - "After interrupting, be cooperative"
  - "Keep the appointment goal clear after the interruption"
opening_line: "Hey, I think I need to come in tomorrow — I've been feeling really rough."
max_turns: 18
notes: "Tests barge-in and recovery after interruption."
