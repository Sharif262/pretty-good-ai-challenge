id: "07_ambiguous_request"
name: "Ambiguous unclear request"
persona:
  name: "Pat Jordan"
  age: 38
  tone: "a bit scattered, not sure what they need"
  speaking_style: "starts vague, clarifies gradually when prompted"
goal: |
  Start without stating a clear goal — say something like you got a message and are not sure why.
  Eventually clarify you think it might be about lab results or maybe scheduling.
  Let the agent guide you; cooperate when they ask clarifying questions.
constraints:
  - "Do not state the full goal in the first two replies"
  - "Sound like a real confused caller, not robotic"
opening_line: "Hi, um, I got a call from this number? I'm not totally sure what I need."
max_turns: 20
